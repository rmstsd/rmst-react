    <title>Vite react</title>
    <script>
      const noop = cb => {
        cb()
      }

      window.setTimeout = noop
      window.setInterval = noop
      window.requestIdleCallback = noop
      window.requestAnimationFrame = noop

      class SyncMessageChannel {
        constructor() {
          this.port1 = {
            postMessage: this.postMessage.bind(this),
            onmessage: null
          }
          this.port2 = {
            postMessage: this.postMessage.bind(this),
            onmessage: null
          }
        }

        postMessage(message) {
          if (typeof this.port1.onmessage === 'function') {
            this.port1.onmessage({ data: message })
          } else if (typeof this.port2.onmessage === 'function') {
            this.port2.onmessage({ data: message })
          }
        }
      }
