name: 构建发布

on:
  push:
    branches:
      - master # 修改为你的默认分支

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install

      - name: Build project
        run: yarn build

      - name: Create Release
        uses: actions/create-release
        env:
          GITHUB_TOKEN: ${{ secrets.build }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset
        env:
          GITHUB_TOKEN: ${{ secrets.build }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist
          asset_name: dist.zip # 修改为你想要的压缩包名称
          asset_content_type: application/zip
